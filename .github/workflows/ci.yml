name: CI devops 2026

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test with Maven
        run: mvn clean verify --file ./simpleapi/pom.xml

      - name: SonarCloud analysis
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=YOUR_PROJECT_KEY -Dsonar.organization=stackoverswag -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} --file ./simpleapi/pom.xml
