name: CI devops 2026

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04

    steps:
      # Downloads your repository code into the GitHub runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs Java 21 so Maven can build the project
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Builds the backend and runs unit/integration tests
      - name: Build and test with Maven
        run: mvn clean verify --file ./simpleapi/pom.xml